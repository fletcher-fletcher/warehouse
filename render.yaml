services:
  - type: web
    name: warehouse
    runtime: php
    buildCommand: composer install --no-dev
    startCommand: php -S 0.0.0.0:10000 -t .
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
